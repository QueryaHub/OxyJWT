site_name: OxyJWT
site_description: A Python JWT library powered by a Rust core.
site_url: https://queryahub.github.io/OxyJWT/
repo_url: https://github.com/QueryaHub/OxyJWT
repo_name: QueryaHub/OxyJWT

theme:
  name: material
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Usage:
      - Encoding tokens: usage/encoding.md
      - Decoding tokens: usage/decoding.md
      - Keys and algorithms: usage/keys.md
      - Handling errors: usage/errors.md
  - Security: security.md
  - API Reference: api-reference.md
  - Development: development.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

strict: true
