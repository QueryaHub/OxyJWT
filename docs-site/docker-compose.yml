# Static site (nginx). Map host 8001 → container 80, then point your existing
# reverse proxy (TLS, certificates) at http://127.0.0.1:8001/ or the published port.
services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
    image: oxyjwt-docs:latest
    ports:
      - "127.0.0.1:${OXYJWT_DOCS_PORT:-8001}:80"
    restart: unless-stopped
